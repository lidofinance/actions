name: Verify commit signatures
description: Verify PR commits against trusted GPG public keys and Argo CD-compatible seal commits

inputs:
  base-sha:
    description: SHA of the PR base commit
    required: true
  head-sha:
    description: SHA of the PR head commit
    required: true
  additional-gpg-pubkeys:
    description: Optional newline-separated paths to additional trusted ASCII-armored public-key files in the caller repository
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Verify commits
      shell: bash
      run: python3 "${{ github.action_path }}/verify.py"
      env:
        BASE_SHA: ${{ inputs.base-sha }}
        HEAD_SHA: ${{ inputs.head-sha }}
        ADDITIONAL_GPG_PUBKEYS: ${{ inputs.additional-gpg-pubkeys }}
