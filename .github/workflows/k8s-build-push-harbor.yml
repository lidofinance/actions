name: Reusable build and push image to Harbor

on:
  workflow_call:
    inputs:
      tag:
        description: Image tag to push
        required: true
        type: string
      registry:
        description: Harbor registry host
        required: true
        type: string
      registry_username:
        required: true
        type: string
      image:
        description: Image path in registry
        required: true
        type: string
      environment:
        description: GitHub Environment name
        required: true
        type: string
      build_context:
        description: Docker build context
        required: false
        type: string
        default: .
      dockerfile:
        description: Dockerfile path
        required: false
        type: string
        default: Dockerfile

    secrets:
      registry_token:
        required: true

permissions:
  contents: read

concurrency:
  group: harbor-push-${{ inputs.registry }}-${{ inputs.image }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build-and-push:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-22.04

    steps:
      - name: Validate image tag
        run: |
          if [[ ! "${{ inputs.tag }}" =~ ^[a-zA-Z0-9._-]+$ ]]; then
            echo "Invalid image tag: ${{ inputs.tag }}"
            echo "Allowed characters: letters, numbers, dot, underscore, dash"
            exit 1
          fi

          if [[ "${{ inputs.tag }}" == "latest" ]]; then
            echo "Do not push mutable 'latest' tag from this workflow"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup buildx
        id: buildx
        uses: docker/setup-buildx-action@d70bba72b1f3fd22344832f00baa16ece964efeb # v3.3.0

      - name: Login to Harbor
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_token }}

      - name: Build and push docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile }}
          push: true
          builder: ${{ steps.buildx.outputs.name }}
          tags: ${{ inputs.registry }}/${{ inputs.image }}:${{ inputs.tag }}
          build-args: |
            BUILD_VERSION=${{ inputs.tag }}
            BUILD_BRANCH=${{ github.ref_name }}
            BUILD_COMMIT=${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
